<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI Chatbot with Firebase Auth</title>

  <!-- Your existing style.css -->
  <link rel="stylesheet" href="style.css" />

  <style>
    /* Minimal extra styling for auth UI */
    .login-box {
      max-width: 360px;
      margin: 40px auto;
      padding: 24px;
      border-radius: 12px;
      background: white;
      box-shadow: 0 8px 24px rgba(0,0,0,0.1);
      font-family: inherit;
    }
    .auth-btn {
      width: 100%;
      background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
      border: none;
      color: white;
      padding: 12px 0;
      font-size: 1rem;
      border-radius: 24px;
      cursor: pointer;
      transition: background 0.3s ease;
    }
    .auth-btn:hover {
      background: linear-gradient(135deg, #4338ca 0%, #6d28d9 100%);
    }
    .auth-form input {
      width: 100%;
      padding: 12px 16px;
      margin-bottom: 12px;
      border: 2px solid #e2e8f0;
      border-radius: 24px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s ease;
    }
    .auth-form input:focus {
      border-color: #4f46e5;
      box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
    }
    .or-divider {
      margin: 12px 0;
      text-align: center;
      font-weight: 600;
      color: #64748b;
      position: relative;
    }
    .or-divider span {
      background: white;
      padding: 0 12px;
      position: relative;
      z-index: 1;
    }
    .or-divider::before {
      content: "";
      position: absolute;
      top: 50%;
      left: 12px;
      right: 12px;
      height: 1px;
      background: #cbd5e1;
      transform: translateY(-50%);
      z-index: 0;
    }
    .toggle-link {
      text-align: center;
      font-size: 0.9rem;
      margin-top: 12px;
      color: #4f46e5;
      cursor: pointer;
    }
    .toggle-link a {
      color: #7c3aed;
      text-decoration: none;
    }
    .toggle-link a:hover {
      text-decoration: underline;
    }
    .error-message {
      background: #fef2f2;
      color: #dc2626;
      border: 1px solid #fecaca;
      padding: 8px 12px;
      border-radius: 8px;
      margin-top: 12px;
      font-size: 0.9rem;
    }

    
    
  </style>
</head>
<body>
  <div id="authUI"></div>
  <div class="chat-wrapper">
    <div id="userInfo" style="display:none"></div>
    <div class="chat-container" style="display:none">
      <header class="chat-header">
        <h1>AI Chatbot</h1>
        <div class="status-indicator">
          <span class="status-dot"></span><span>Online</span>
        </div>
      </header>
      <main id="chatMessages" class="chat-messages"></main>
      <div id="typingIndicator" class="typing-indicator">
        <div class="typing-dots">
          <span></span><span></span><span></span>
        </div>
        AI is typing...
      </div>
      <form id="chatForm" class="chat-input-form">
        <div class="input-container">
          <input id="messageInput" type="text" placeholder="Type your message..." disabled autocomplete="off" />
          <button id="sendButton" type="submit" disabled aria-label="Send message">
            &#9658;
          </button>
        </div>
      </form>
    </div>
  </div>




  <!-- Load your JS modules as ES modules -->
  <!-- Please keep your JS files importing Firebase v9 internally -->

  <script type="module" src="js/firebase-config.js"></script>
  <script type="module" src="js/auth.js"></script>
  <script type="module" src="js/chat.js"></script>
</body>
</html>
