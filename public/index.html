<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI Chatbot</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Auth screen -->
  <div id="authUI"></div>

  <!-- Main app layout -->
  <div class="app-layout">
    <!-- Sidebar -->
    <aside class="chat-sidebar" style="display:none">
      <div class="sidebar-header">
        <div class="sidebar-logo">
          <span class="sidebar-logo-icon">AI</span>
          <span class="sidebar-logo-text">Chatbot</span>
        </div>
        <button id="sidebarToggle" class="sidebar-toggle" title="Toggle sidebar" aria-label="Toggle sidebar">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
      </div>
      <button id="newChatBtn" class="new-chat-btn" disabled>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        New chat
      </button>
      <div class="chat-list-label">Recent chats</div>
      <div id="chatList" class="chat-list"></div>
      <div class="sidebar-footer">
        <div id="chatLimitNote" class="chat-limit-note">0/5 chats used</div>
        <div class="sidebar-tip">Each chat supports up to 20 messages</div>
      </div>
    </aside>

    <!-- Main chat area -->
    <div class="chat-main">
      <div id="userInfo" style="display:none"></div>
      <div class="chat-container" style="display:none">
        <header class="chat-header">
          <div class="chat-header-left">
            <button id="mobileMenuBtn" class="mobile-menu-btn" aria-label="Open chats">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
            </button>
            <h1 id="currentChatTitle">AI Chatbot</h1>
          </div>
          <div class="status-indicator">
            <span class="status-dot"></span><span>Online</span>
          </div>
        </header>

        <div id="messageLimitBanner" class="message-limit-banner" style="display:none"></div>

        <main id="chatMessages" class="chat-messages"></main>

        <div id="typingIndicator" class="typing-indicator">
          <div class="typing-dots"><span></span><span></span><span></span></div>
          AI is typing...
        </div>

        <form id="chatForm" class="chat-input-form">
          <div class="input-container">
            <input id="messageInput" type="text" placeholder="Type your message..." disabled autocomplete="off" />
            <button id="sendButton" type="submit" disabled aria-label="Send message">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script type="module" src="js/supabase-config.js"></script>
  <script type="module" src="js/auth.js"></script>
  <script type="module" src="js/chat.js"></script>
</body>
</html>
